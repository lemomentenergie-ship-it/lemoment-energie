<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecteur de Cours | Le Moment Énergie</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* LMS PLAYER SPECIFIC STYLES */
    body {
      background-color: var(--color-bg-cream);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    
    header.player-header {
      position: relative;
      background-color: var(--color-white);
      border-bottom: 1px solid var(--color-sand);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      height: 70px;
    }
    
    .player-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-primary);
    }
    .player-back-btn:hover {
      color: var(--color-accent-gold-dark);
    }

    .player-container {
      display: flex;
      flex-grow: 1;
      overflow: hidden;
      height: calc(100vh - 70px);
    }

    /* SIDEBAR */
    .player-sidebar {
      width: 350px;
      background-color: var(--color-white);
      border-right: 1px solid var(--color-sand);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-course-title {
      padding: 24px 20px;
      border-bottom: 1px solid var(--color-sand);
      background-color: var(--color-primary-bg);
    }
    .sidebar-course-title h2 {
      font-size: 1.3rem;
      color: var(--color-text-dark);
      margin-bottom: 8px;
    }
    
    .sidebar-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      font-weight: 600;
    }
    .sidebar-progress-bar {
      flex-grow: 1;
      height: 6px;
      background-color: var(--color-sand);
      border-radius: 3px;
      margin-left: 12px;
      overflow: hidden;
    }
    .sidebar-progress-fill {
      height: 100%;
      background-color: var(--color-primary);
      width: 0%;
      transition: width 0.4s ease;
    }

    .sidebar-module {
      border-bottom: 1px solid var(--color-sand);
    }
    .module-header {
      padding: 18px 20px;
      background-color: var(--color-bg-cream);
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-text-dark);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .module-lessons {
      list-style: none;
    }
    .lesson-item {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(74, 93, 78, 0.05);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: var(--transition-quick);
      font-size: 0.88rem;
    }
    .lesson-item:hover {
      background-color: var(--color-primary-bg);
    }
    .lesson-item.active {
      background-color: var(--color-primary-bg);
      border-left: 4px solid var(--color-accent-gold);
      padding-left: 16px;
      font-weight: 500;
    }
    .lesson-checkbox {
      width: 18px;
      height: 18px;
      border: 1px solid var(--color-primary);
      border-radius: 4px;
      cursor: pointer;
      accent-color: var(--color-primary);
    }
    
    /* MAIN AREA */
    .player-main {
      flex-grow: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 40px;
      height: 100%;
    }

    /* CUSTOM VIDEO PLAYER */
    .video-frame {
      width: 100%;
      aspect-ratio: 16/9;
      max-height: 480px;
      background-color: #000;
      border-radius: var(--border-radius-md);
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow-medium);
      margin-bottom: 30px;
    }
    
    .video-poster {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.5s ease;
    }
    
    .video-play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(28, 43, 33, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .video-play-overlay:hover {
      background-color: rgba(28, 43, 33, 0.5);
    }
    .play-icon-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: var(--color-white);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-premium);
      font-size: 2rem;
      color: var(--color-primary);
      transition: var(--transition-smooth);
    }
    .video-play-overlay:hover .play-icon-btn {
      transform: scale(1.1);
      background-color: var(--color-accent-gold);
      color: var(--color-white);
    }

    /* MOCK PLAYER CONTROLS */
    .mock-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 20px;
      display: none; /* Shown when playing */
      flex-direction: column;
      gap: 10px;
    }
    .mock-progress-bar {
      width: 100%;
      height: 6px;
      background-color: rgba(255,255,255,0.3);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    .mock-progress-fill {
      height: 100%;
      background-color: var(--color-accent-gold);
      width: 40%;
      border-radius: 3px;
    }
    .mock-btn-row {
      display: flex;
      justify-content: space-between;
      color: white;
      font-size: 0.9rem;
    }

    /* CONTENT TABS */
    .lesson-meta-tabs {
      background-color: var(--color-white);
      border-radius: var(--border-radius-md);
      padding: 30px;
      box-shadow: var(--shadow-subtle);
      border: 1px solid var(--color-sand);
    }

    .tab-header-row {
      display: flex;
      border-bottom: 1px solid var(--color-sand);
      margin-bottom: 24px;
      gap: 30px;
    }
    .tab-trigger {
      background: none;
      border: none;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--color-text-muted);
      padding: 12px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition-quick);
    }
    .tab-trigger.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-accent-gold);
    }

    .tab-pane {
      display: none;
    }
    .tab-pane.active {
      display: block;
      animation: fadeIn 0.4s ease forwards;
    }

    /* RESOURCES TAB */
    .resource-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .resource-card {
      border: 1px solid var(--color-sand);
      border-radius: var(--border-radius-sm);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--color-bg-cream);
    }
    .resource-info h5 {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--color-text-dark);
      margin-bottom: 4px;
    }
    .resource-info p {
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    /* COMMUNITY TAB */
    .comments-thread {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 10px;
    }
    .comment-block {
      display: flex;
      gap: 16px;
    }
    .comment-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--color-primary-bg);
      color: var(--color-primary);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .comment-content {
      background-color: var(--color-bg-cream);
      padding: 16px;
      border-radius: var(--border-radius-sm);
      flex-grow: 1;
    }
    .comment-author-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .comment-author {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--color-text-dark);
    }
    .comment-date {
      font-size: 0.75rem;
      color: var(--color-text-muted);
    }
    .comment-text {
      font-size: 0.88rem;
      color: var(--color-text-dark);
    }

    .comment-form {
      display: flex;
      gap: 15px;
      border-top: 1px solid var(--color-sand);
      padding-top: 20px;
    }
    .comment-form input {
      flex-grow: 1;
      padding: 12px 16px;
      border: 1px solid var(--color-sand);
      border-radius: var(--border-radius-sm);
      font-family: var(--font-sans);
      font-size: 0.9rem;
    }
    
    @media (max-width: 900px) {
      .player-container {
        flex-direction: column;
      }
      .player-sidebar {
        width: 100%;
        height: 250px;
        border-right: none;
        border-bottom: 1px solid var(--color-sand);
      }
      .player-main {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- --- PLAYER HEADER --- -->
  <header class="player-header">
    <a href="formations.html" class="player-back-btn">
      <span>←</span> Retour aux formations
    </a>
    <div style="text-align: right;">
      <h4 style="font-family: var(--font-sans); font-weight: 600; font-size: 0.95rem; color: var(--color-text-dark);" id="header-course-title">Chargement...</h4>
    </div>
  </header>

  <!-- --- CORE LMS LAYER --- -->
  <div class="player-container">
    
    <!-- Sidebar Left -->
    <aside class="player-sidebar">
      <div class="sidebar-course-title">
        <h2 id="sidebar-title">Nom de la formation</h2>
        <div class="sidebar-progress">
          <span id="progress-percent">0% complété</span>
          <div class="sidebar-progress-bar">
            <div class="sidebar-progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>
      
      <!-- Module/Lesson Accordion -->
      <div class="sidebar-module">
        <div class="module-header">
          <span>Module 1 : Fondations</span>
          <span>▼</span>
        </div>
        <ul class="module-lessons" id="lessons-list">
          <!-- Populated by JS -->
        </ul>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="player-main">
      
      <!-- Video Window -->
      <div class="video-frame">
        <img src="images/hero.png" alt="Cover" class="video-poster" id="video-poster">
        <div class="video-play-overlay" id="play-overlay">
          <button class="play-icon-btn">▶</button>
        </div>
        
        <!-- Mock Controls -->
        <div class="mock-controls" id="mock-controls">
          <div class="mock-progress-bar">
            <div class="mock-progress-fill"></div>
          </div>
          <div class="mock-btn-row">
            <span>⏸ Pause</span>
            <span>04:12 / 12:45</span>
            <span>🔊 100%</span>
          </div>
        </div>
      </div>

      <!-- Tabs and Details -->
      <div class="lesson-meta-tabs">
        <div class="tab-header-row">
          <button class="tab-trigger active" data-target="lesson-tab">Contenu du Cours</button>
          <button class="tab-trigger" data-target="resources-tab">Ressources &amp; Fichiers</button>
          <button class="tab-trigger" data-target="community-tab">Communauté</button>
        </div>

        <!-- Tab 1: Lesson Content -->
        <div class="tab-pane active" id="lesson-tab">
          <h2 style="font-size: 1.8rem; margin-bottom: 16px; color: var(--color-text-dark);" id="lesson-title">Titre de la leçon</h2>
          <div style="color: var(--color-text-muted); line-height: 1.8; font-size: 0.98rem;" id="lesson-description">
            Description de la leçon active...
          </div>
        </div>

        <!-- Tab 2: Resources -->
        <div class="tab-pane" id="resources-tab">
          <div class="resource-list" id="resources-list">
            <!-- Populated dynamically -->
          </div>
        </div>

        <!-- Tab 3: Community -->
        <div class="tab-pane" id="community-tab">
          <div class="comments-thread" id="comments-thread">
            <!-- Simulated Comments -->
          </div>
          <form class="comment-form" id="comment-form">
            <div class="comment-avatar">ME</div>
            <input type="text" id="comment-input" placeholder="Poser une question ou laisser un commentaire..." required>
            <button type="submit" class="btn btn-primary" style="padding: 10px 20px; font-size: 0.85rem; border-radius: var(--border-radius-sm);">Publier</button>
          </form>
        </div>
      </div>

    </main>

  </div>

  <script>
    // DATASET FOR DEMO COURSES
    const COURSES_DATA = {
      reiki: {
        title: "Reiki Usui - Niveau 1 (Shoden)",
        poster: "images/reiki.png",
        lessons: [
          {
            id: 1,
            title: "1. Introduction au Reiki Usui et Mikao Usui",
            desc: "<p>Bienvenue dans ce premier module. Nous allons étudier l'origine du Reiki Usui traditionnel, fondé par Mikao Usui au Japon au début du XXe siècle. Nous verrons comment cette énergie universelle de vie a été redécouverte et comment elle se transmet.</p><p>Dans cette leçon vidéo de 15 minutes, vous comprendrez l'importance de la lignée de transmission et l'éthique liée à la pratique énergétique.</p>",
            files: [
              { name: "Manuel de Reiki Usui - Niveau 1.pdf", size: "4.2 Mo" },
              { name: "Arbre de Lignée Traditionnelle Usui.pdf", size: "1.1 Mo" }
            ],
            comments: [
              { author: "Marie L.", date: "Il y a 2 jours", text: "Merci pour cette introduction très claire ! La vie de Mikao Usui est fascinante." },
              { author: "Pierre D.", date: "Il y a 5 jours", text: "Est-ce qu'on reçoit le manuel papier lors de l'initiation en présentiel ?" }
            ]
          },
          {
            id: 2,
            title: "2. Les 5 Principes Spirituels (Gokai)",
            desc: "<p>Les Gokai sont les fondations quotidiennes du praticien Reiki. Mikao Usui les décrivait comme 'la méthode secrète pour attirer le bonheur'. Nous allons les analyser en détail et voir comment les intégrer au quotidien :</p><ul style='margin-left: 20px; margin-top: 10px;'><li>Juste pour aujourd'hui, je libère la colère.</li><li>Juste pour aujourd'hui, je libère l'inquiétude.</li><li>Juste pour aujourd'hui, je suis reconnaissant.</li><li>Juste pour aujourd'hui, je vis honnêtement.</li><li>Juste pour aujourd'hui, je suis bienveillant envers les autres.</li></ul>",
            files: [
              { name: "Fiche Pratique - Les 5 Principes Gokai à imprimer.pdf", size: "850 Ko" }
            ],
            comments: [
              { author: "Sophie K.", date: "Il y a 1 jour", text: "Le fait de rajouter 'Juste pour aujourd'hui' change toute la perspective, c'est tellement plus facile d'y travailler au jour le jour !" }
            ]
          },
          {
            id: 3,
            title: "3. Préparation énergétique et ancrage",
            desc: "<p>Avant tout soin, il est indispensable de préparer son propre canal énergétique et de s'ancrer. Dans cette vidéo, nous étudions la technique de méditation Gassho et l'exercice d'ancrage à la terre pour rester centré et éviter de capter les tensions d'autrui.</p>",
            files: [
              { name: "Méditation Gassho - Audio Guidé.mp3", size: "12 Mo" }
            ],
            comments: []
          },
          {
            id: 4,
            title: "4. L'auto-traitement : positions des mains",
            desc: "<p>L'auto-traitement est la pratique clé pendant les 21 jours suivant l'initiation. Nous allons voir l'enchaînement complet des 12 positions des mains sur la tête, le buste et le dos pour s'auto-harmoniser.</p>",
            files: [
              { name: "Guide Visuel des 12 positions d'auto-traitement.pdf", size: "2.5 Mo" }
            ],
            comments: []
          },
          {
            id: 5,
            title: "5. Équilibrer les chakras d'un receveur",
            desc: "<p>Pour finir ce premier niveau, apprenez comment structurer un soin complet sur un tiers (proche ou client). Nous voyons comment balayer le champ énergétique (Byosen), repérer les déséquilibres et harmoniser les 7 chakras principaux.</p>",
            files: [
              { name: "Protocole Complet - Soin Reiki sur Autrui.pdf", size: "1.8 Mo" }
            ],
            comments: []
          }
        ]
      },
      massage: {
        title: "Massage Californien & Sensoriel",
        poster: "images/massage.png",
        lessons: [
          {
            id: 1,
            title: "1. Philosophie et posture du masseur",
            desc: "<p>Le massage Californien est le massage de la détente psychocorporelle par excellence. Il repose sur de longs mouvements fluides, lents et enveloppants. Cette leçon explique la posture du praticien (travail en fente, transfert du poids du corps) pour masser sans se fatiguer.</p>",
            files: [
              { name: "Les postures ergonomiques du masseur.pdf", size: "1.5 Mo" }
            ],
            comments: [
              { author: "Julien V.", date: "Il y a 3 jours", text: "La posture en fente change tout ! J'avais souvent mal au dos après 30 min, ces conseils m'ont sauvé." }
            ]
          },
          {
            id: 2,
            title: "2. Préparation de la cabine et huiles bio",
            desc: "<p>Créer une ambiance relaxante est essentiel pour un massage sensoriel réussi. Température de la pièce, musiques propices, et sélection des huiles végétales de support (Amande douce, Sésame) et des huiles essentielles apaisantes (Lavande, Ylang-Ylang).</p>",
            files: [
              { name: "Guide des Huiles et Synergies Aromatiques.pdf", size: "980 Ko" }
            ],
            comments: []
          },
          {
            id: 3,
            title: "3. Techniques d'effleurage et de lissage",
            desc: "<p>Découvrez les mouvements de base pour débuter le massage. Les effleurages superficiels permettent d'établir le contact, de répartir l'huile et de calmer le système nerveux du receveur. Suivi des grands lissages complets des chevilles aux épaules.</p>",
            files: [
              { name: "Fiche technique - Les mouvements de base.pdf", size: "2.1 Mo" }
            ],
            comments: []
          },
          {
            id: 4,
            title: "4. Dénouer les tensions du dos et des épaules",
            desc: "<p>Le dos accumule la majorité du stress physique. Cette leçon vidéo vous enseigne des techniques spécifiques de pétrissage, de pressions glissées le long de la colonne, et de relâchement des trapèzes.</p>",
            files: [
              { name: "Protocole de Massage du Dos.pdf", size: "1.4 Mo" }
            ],
            comments: []
          },
          {
            id: 5,
            title: "5. Enchaînement complet de 60 minutes",
            desc: "<p>Combinez toutes les compétences acquises pour effectuer un massage californien complet d'une heure. Ce protocole fluide décrit la transition dos, jambes, pieds, bras et buste pour une harmonisation sensorielle absolue.</p>",
            files: [
              { name: "Grille de Timing et Enchaînement 60min.pdf", size: "850 Ko" }
            ],
            comments: []
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      // 1. Get query parameter for course
      const urlParams = new URLSearchParams(window.location.search);
      const courseKey = urlParams.get('course') || 'reiki';
      const course = COURSES_DATA[courseKey] || COURSES_DATA.reiki;

      // 2. Set DOM headers
      document.getElementById('header-course-title').textContent = course.title;
      document.getElementById('sidebar-title').textContent = course.title;
      document.getElementById('video-poster').src = course.poster;

      let activeLessonIndex = 0;

      // 3. Populate sidebar lessons list
      const lessonsList = document.getElementById('lessons-list');
      
      const renderLessons = () => {
        lessonsList.innerHTML = '';
        course.lessons.forEach((lesson, index) => {
          const isCompleted = localStorage.getItem(`${courseKey}-lesson-${lesson.id}-completed`) === 'true';
          const isActive = index === activeLessonIndex;
          
          const li = document.createElement('li');
          li.className = `lesson-item ${isActive ? 'active' : ''}`;
          
          li.innerHTML = `
            <input type="checkbox" class="lesson-checkbox" ${isCompleted ? 'checked' : ''} data-id="${lesson.id}">
            <span class="lesson-link-text" style="flex-grow: 1;">${lesson.title}</span>
          `;
          
          // Click on checkbox triggers completion toggling
          const checkbox = li.querySelector('.lesson-checkbox');
          checkbox.addEventListener('click', (e) => {
            e.stopPropagation(); // Avoid triggering active change
            localStorage.setItem(`${courseKey}-lesson-${lesson.id}-completed`, checkbox.checked);
            updateProgress();
          });

          // Click on item loads lesson
          li.addEventListener('click', () => {
            activeLessonIndex = index;
            loadActiveLesson();
            renderLessons();
          });

          lessonsList.appendChild(li);
        });
      };

      // Load active lesson details
      const loadActiveLesson = () => {
        const lesson = course.lessons[activeLessonIndex];
        document.getElementById('lesson-title').textContent = lesson.title;
        document.getElementById('lesson-description').innerHTML = lesson.desc;

        // Reset video state
        const playOverlay = document.getElementById('play-overlay');
        const mockControls = document.getElementById('mock-controls');
        playOverlay.style.opacity = '1';
        playOverlay.style.pointerEvents = 'auto';
        mockControls.style.display = 'none';

        // Load files
        const resourcesList = document.getElementById('resources-list');
        resourcesList.innerHTML = '';
        if (lesson.files && lesson.files.length > 0) {
          lesson.files.forEach(file => {
            const card = document.createElement('div');
            card.className = 'resource-card';
            card.innerHTML = `
              <div class="resource-info">
                <h5>📄 ${file.name}</h5>
                <p>Format PDF • ${file.size}</p>
              </div>
              <a href="#" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.8rem;" onclick="alert('Téléchargement du document : ${file.name}'); return false;">Télécharger</a>
            `;
            resourcesList.appendChild(card);
          });
        } else {
          resourcesList.innerHTML = '<p style="color: var(--color-text-muted); font-style: italic;">Aucune ressource disponible pour cette leçon.</p>';
        }

        // Load comments
        const commentsThread = document.getElementById('comments-thread');
        commentsThread.innerHTML = '';
        if (lesson.comments && lesson.comments.length > 0) {
          lesson.comments.forEach(comment => {
            appendComment(comment.author, comment.date, comment.text);
          });
        } else {
          commentsThread.innerHTML = '<p style="color: var(--color-text-muted); font-style: italic;" id="no-comments-text">Soyez le premier à poser une question sur cette leçon !</p>';
        }
      };

      const appendComment = (author, date, text) => {
        const commentsThread = document.getElementById('comments-thread');
        const block = document.createElement('div');
        block.className = 'comment-block';
        
        // Initials for avatar
        const initials = author.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);

        block.innerHTML = `
          <div class="comment-avatar">${initials}</div>
          <div class="comment-content">
            <div class="comment-author-row">
              <span class="comment-author">${author}</span>
              <span class="comment-date">${date}</span>
            </div>
            <p class="comment-text">${text}</p>
          </div>
        `;
        commentsThread.appendChild(block);
        commentsThread.scrollTop = commentsThread.scrollHeight;
      };

      // Progress bar calculations
      const updateProgress = () => {
        let completedCount = 0;
        course.lessons.forEach(lesson => {
          if (localStorage.getItem(`${courseKey}-lesson-${lesson.id}-completed`) === 'true') {
            completedCount++;
          }
        });
        const percent = Math.round((completedCount / course.lessons.length) * 100);
        document.getElementById('progress-percent').textContent = `${percent}% complété`;
        document.getElementById('progress-fill').style.width = `${percent}%`;
      };

      // 4. Tab switching logic
      const tabTriggers = document.querySelectorAll('.tab-trigger');
      const tabPanes = document.querySelectorAll('.tab-pane');
      
      tabTriggers.forEach(trigger => {
        trigger.addEventListener('click', () => {
          tabTriggers.forEach(t => t.classList.remove('active'));
          tabPanes.forEach(p => p.classList.remove('active'));

          trigger.classList.add('active');
          const target = trigger.getAttribute('data-target');
          document.getElementById(target).classList.add('active');
        });
      });

      // 5. Mock Play Action
      const playOverlay = document.getElementById('play-overlay');
      const mockControls = document.getElementById('mock-controls');
      playOverlay.addEventListener('click', () => {
        playOverlay.style.opacity = '0';
        playOverlay.style.pointerEvents = 'none';
        mockControls.style.display = 'flex';
      });

      // 6. Community comment submission
      const commentForm = document.getElementById('comment-form');
      const commentInput = document.getElementById('comment-input');
      
      commentForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = commentInput.value.trim();
        if (text) {
          // Remove "no comments" message if present
          const noComments = document.getElementById('no-comments-text');
          if (noComments) noComments.remove();

          appendComment("Moi (Élève)", "À l'instant", text);
          
          // Save in dataset so it remains if toggled
          course.lessons[activeLessonIndex].comments.push({
            author: "Moi (Élève)",
            date: "À l'instant",
            text: text
          });

          commentInput.value = '';
        }
      });

      // Initialization
      renderLessons();
      loadActiveLesson();
      updateProgress();
    });
  </script>
</body>
</html>
